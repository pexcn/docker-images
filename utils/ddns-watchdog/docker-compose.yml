services:
  ddns-watchdog:
    image: pexcn/docker-images:ddns-watchdog
    container_name: ddns-watchdog
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Taipei
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: >-
      --domain ddns.example.com
      --watch-ip 192.168.1.1
      --nameserver 119.29.29.29
      --action "docker-restart:wireguard"
