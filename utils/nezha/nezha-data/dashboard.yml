install_host: status.example.com:443
language: zh_CN
listen_host: 127.0.0.1
listen_port: 8008
location: Asia/Taipei
site_name: Server Status
tls: true
jwt_timeout: 12
tsdb:
  data_path: /opt/nezha/tsdb
  retention_days: 30
  min_free_disk_space_gb: 5
  max_memory_mb: 128
  write_buffer_size: 256
  write_buffer_flush_interval: 5
