# https://status.example.com
upstream nezha-dashboard {
    server 127.0.0.1:8008;
}

upstream nezha-service {
    server 127.0.0.1:8008;
    keepalive 64;
}

server {
    listen 443 ssl;
    listen 443 quic;
    server_name status.example.com;

    ssl_certificate /cert/status.example.com_ecc/fullchain.cer;
    ssl_certificate_key /cert/status.example.com_ecc/status.example.com.key;
    ssl_trusted_certificate /cert/status.example.com_ecc/ca.cer;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Alt-Svc 'h3=":$server_port"; ma=86400' always;

    # https://nezha.wiki/en_US/guide/dashboardq.html#unable-to-connect-agent-with-nginx-reverse-proxy-for-grpc
    underscores_in_headers on;

    # web
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Early-Data $ssl_early_data;
        proxy_set_header nz-realip $remote_addr;
        proxy_buffers 4 256k;
        proxy_buffer_size 128k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
        proxy_pass http://nezha-dashboard;
    }

    # websocket
    location ~* ^/api/v1/ws/(server|terminal|file)(.*)$ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Early-Data $ssl_early_data;
        proxy_set_header nz-realip $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Origin https://$host;
        proxy_pass http://nezha-dashboard;
    }

    # grpc
    location ^~ /proto.NezhaService/ {
        grpc_set_header Host $host;
        grpc_set_header nz-realip $remote_addr;
        grpc_read_timeout 600s;
        grpc_send_timeout 600s;
        grpc_socket_keepalive on;
        grpc_buffer_size 4m;
        client_max_body_size 10m;
        grpc_pass grpc://nezha-service;
    }

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }
}
