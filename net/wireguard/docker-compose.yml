services:
  wireguard:
    image: pexcn/docker-images:wireguard
    container_name: wireguard
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: Asia/Taipei
      PEER_RESOLVE_INTERVAL: 0
      USE_IPTABLES_NFT_BACKEND: 0
    volumes:
      - ./wireguard-data:/etc/wireguard
